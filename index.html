<body><main>
<section id="setup" class="card">
<h1>Level Up Brothers</h1>
<p class="muted">初回のみFirebase設定を貼り付けます。初期設定ツールで使ったものと同じ内容です。</p>
<label>Firebase設定</label>
<textarea id="configInput" placeholder='const firebaseConfig = { apiKey: "...", ... };'></textarea>
<div class="actions"><button id="connectBtn" class="primary">設定を保存して接続</button><button id="clearBtn" class="secondary">保存済み設定を消す</button></div>
<div id="configStatus" class="status">未接続です。</div>
</section>
<section id="login" class="card hidden">
<h2>ログイン</h2><div class="row"><div><label>メールアドレス</label><input id="email" type="email" autocomplete="username"></div><div><label>パスワード</label><input id="password" type="password" autocomplete="current-password"></div></div>
<div class="actions"><button id="loginBtn" class="primary">ログイン</button></div><div id="loginStatus" class="status">ログインしていません。</div>
</section>
<section id="app" class="hidden">
<div class="card topbar"><div><h1>Level Up Brothers</h1><div id="who" class="muted"></div></div><button id="logoutBtn" class="secondary">ログアウト</button></div>
<div id="nav" class="nav"></div>
<div id="view"></div>
</section>
</main>
<script type="module">
import {initializeApp,getApps} from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
import {getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged} from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';
import {getFirestore,doc,getDoc,collection,getDocs,query,where,orderBy,addDoc,updateDoc,serverTimestamp,limit} from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';
const $=id=>document.getElementById(id);let app,auth,db,profile,user;let currentRules=[];let selectedFile=null;let editingRecord=null;
const SUBJECTS=['国語','数学','英語','理科','社会','音楽','美術','保健体育','技術・家庭','その他'];
const FIVE_SUBJECTS=['国語','数学','英語','理科','社会'];
const NINE_SUBJECTS=['国語','社会','数学','理科','音楽','美術','保健体育','技術・家庭','英語'];
function status(el,text,kind=''){el.textContent=text;el.className=`status ${kind}`.trim()}
function parse(raw){let t=raw.trim().replace(/^export\s+const\s+firebaseConfig\s*=\s*/m,'').replace(/^const\s+firebaseConfig\s*=\s*/m,'').replace(/;\s*$/,'').trim().replace(/([,{]\s*)([A-Za-z_$][\w$]*)(\s*:)/g,'$1"$2"$3').replace(/'/g,'"').replace(/,\s*([}\]])/g,'$1');const c=JSON.parse(t);for(const k of ['apiKey','authDomain','projectId','appId'])if(!c[k])throw new Error(`${k}がありません。`);return c}
async function connect(c){if(getApps().length){location.reload();return}app=initializeApp(c);auth=getAuth(app);db=getFirestore(app);localStorage.setItem('lubAppConfig',JSON.stringify(c));status($('configStatus'),`接続しました：${c.projectId}`,'ok');$('login').classList.remove('hidden');onAuthStateChanged(auth,async u=>{user=u;if(!u){$('app').classList.add('hidden');$('login').classList.remove('hidden');return}try{const s=await getDoc(doc(db,'users',u.uid));if(!s.exists())throw new Error('usersにプロフィールがありません。');profile=s.data();if(profile.active===false)throw new Error('このアカウントは無効です。');$('who').textContent=`${profile.displayName}（${profile.role}）`;$('setup').classList.add('hidden');$('login').classList.add('hidden');$('app').classList.remove('hidden');$('app').classList.toggle('child-app',profile.role==='child');buildNav();await showHome()}catch(e){status($('loginStatus'),e.message,'error')}})}
$('connectBtn').onclick=async()=>{try{await connect(parse($('configInput').value))}catch(e){status($('configStatus'),e.message,'error')}};$('clearBtn').onclick=()=>{localStorage.removeItem('lubAppConfig');location.reload()};$('loginBtn').onclick=async()=>{try{await signInWithEmailAndPassword(auth,$('email').value.trim(),$('password').value)}catch(e){status($('loginStatus'),`ログインできません：${e.message}`,'error')}};$('logoutBtn').onclick=()=>signOut(auth);
function buildNav(){
 const childItems=[['ホーム','⌂',showHome],['登録','＋',showRecordForm],['履歴','▤',showChildHistory],['その他','⋯',showChildMore]];
 const parentItems=[['ホーム','',showHome],['支給処理','',showPayments],['一輝のルール','',showRules],['ルールについて','',showPolicy]];
 const items=profile.role==='child'?childItems:parentItems;const n=$('nav');n.innerHTML='';
 items.forEach(([label,icon,fn],i)=>{const b=document.createElement('button');b.dataset.label=label;b.innerHTML=profile.role==='child'?`<span class="nav-icon">${icon}</span><span>${label}</span>`:label;b.className=i===0?'active':'';b.onclick=async()=>{[...n.children].forEach(x=>x.classList.remove('active'));b.classList.add('active');await fn()};n.appendChild(b)})
}
function money(n){return new Intl.NumberFormat('ja-JP').format(Number(n)||0)+'円'}
function dateText(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return new Intl.DateTimeFormat('ja-JP',{month:'numeric',day:'numeric'}).format(d)}
function tsMillis(ts){if(!ts)return 0;if(typeof ts.toMillis==='function')return ts.toMillis();if(typeof ts.toDate==='function')return ts.toDate().getTime();const d=new Date(ts);return Number.isNaN(d.getTime())?0:d.getTime()}
function fiscalYearForDate(d=new Date()){return d.getMonth()+1>=4?d.getFullYear():d.getFullYear()-1}
function elapsedFiscalMonths(d=new Date()){const m=d.getMonth()+1;return m>=4?m-3:m+9}
function recordAchievementDate(r){const raw=r?.inputs?.achievementDate;if(raw){const d=new Date(`${raw}T00:00:00`);if(!Number.isNaN(d.getTime()))return d}if(r?.createdAt?.toDate)return r.createdAt.toDate();const d=new Date(r?.createdAt||0);return Number.isNaN(d.getTime())?null:d}

async function getChildRecords(childId){try{const qy=query(collection(db,'records'),where('childId','==',childId));const s=await getDocs(qy);return s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>tsMillis(b.createdAt)-tsMillis(a.createdAt))}catch(e){console.error('records read error',e);return[]}}
async function getCurrentPeriodId(){try{const qy=query(collection(db,'terms'),where('isCurrent','==',true));const s=await getDocs(qy);return s.docs[0]?.id||null}catch(e){console.error('terms read error',e);return null}}
async function getPaidTotal(childId){try{const qy=query(collection(db,'payments'),where('childId','==',childId));const s=await getDocs(qy);return s.docs.reduce((sum,d)=>{const x=d.data();return x.status==='cancelled'?sum:sum+(Number(x.amount)||0)},0)}catch{return 0}}
async function getAllRecords(){try{const s=await getDocs(collection(db,'records'));return s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>tsMillis(a.createdAt)-tsMillis(b.createdAt))}catch(e){console.error('all records read error',e);return[]}}
async function getAllPayments(){
 try{const s=await getDocs(collection(db,'payments'));return s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>tsMillis(b.createdAt)-tsMillis(a.createdAt))}catch(e){console.error('payments read error',e);return[]}
}
function isChildPeriodSettled(childId,periodId,records,payments){
 const earned=records.filter(r=>r.childId===childId&&r.periodId===periodId&&r.status==='approved').reduce((sum,r)=>sum+(Number(r.calculatedAmount)||0),0);
 const paid=payments.filter(p=>p.childId===childId&&p.periodId===periodId&&p.status!=='cancelled').reduce((sum,p)=>sum+(Number(p.amount)||0),0);
 return earned>0&&paid>=earned;
}
async function isRecordLocked(record){
 const [records,payments]=await Promise.all([getAllRecords(),getAllPayments()]);
 return isChildPeriodSettled(record.childId,record.periodId,records,payments);
}
async function showHome(){
 const v=$('view');
 if(profile.role==='child'){
  const [records,currentPeriodId]=await Promise.all([getChildRecords(profile.childId),getCurrentPeriodId()]);
  const pending=records.filter(r=>['pending','resubmitted'].includes(r.status)&&(!currentPeriodId||r.periodId===currentPeriodId));
  const approved=records.filter(r=>r.status==='approved'&&(!currentPeriodId||r.periodId===currentPeriodId));
  const currentAmount=approved.reduce((s,r)=>s+(Number(r.calculatedAmount)||0),0);
  const recent=records.slice(0,3);
  const latestPending=pending.length?pending.reduce((a,b)=>tsMillis(a.createdAt)>tsMillis(b.createdAt)?a:b):null;
  v.innerHTML=`<div class="child-home-header"><div class="child-home-name">${escapeHtml(profile.displayName)}</div><div class="child-period">${escapeHtml(periodLabel(currentPeriodId||''))}</div></div>
  <section id="earnedCard" class="card earned-card" role="button" tabindex="0"><div class="earned-label">今学期獲得金額</div><div class="earned-amount">${money(currentAmount)}</div><div class="tap-hint">タップして承認済み一覧を見る</div></section>
  <section id="pendingCard" class="card pending-card" role="button" tabindex="0"><div class="pending-main"><span class="pending-dot"></span><div><div class="muted small">確認中</div><div class="pending-count">${pending.length}件</div></div></div><div class="pending-date">${latestPending?`最終申請<br><strong>${dateText(latestPending.createdAt)}</strong>`:'確認中の申請は<br>ありません'}</div></section>
  <button id="quickRecord" class="primary quick-record-mobile">＋ 実績を登録</button>
  <div class="section-heading"><h2>最近の実績</h2><button id="openHistory" class="section-link">すべて見る</button></div>
  <div class="recent-list">${recent.length?recent.map(childCompactRecordHtml).join(''):'<div class="empty">まだ実績はありません。</div>'}</div>`;
  $('quickRecord').onclick=()=>activateNav('登録',showRecordForm);
  $('earnedCard').onclick=showChildApprovedList;$('pendingCard').onclick=showChildPendingList;$('openHistory').onclick=()=>activateNav('履歴',showChildHistory);
  return;
 }
 const [records,currentPeriodId,itsukiPaid,akitoPaid]=await Promise.all([getAllRecords(),getCurrentPeriodId(),getPaidTotal('itsuki'),getPaidTotal('akito')]);
 const pending=records.filter(r=>['pending','resubmitted'].includes(r.status));
 const pendingAmount=pending.reduce((s,r)=>s+(Number(r.calculatedAmount)||0),0);
 const childStats=(childId,paid)=>{const mine=records.filter(r=>r.childId===childId);const p=mine.filter(r=>['pending','resubmitted'].includes(r.status));const approved=mine.filter(r=>r.status==='approved');const total=approved.reduce((s,r)=>s+(Number(r.calculatedAmount)||0),0);return{pending:p.length,pendingAmount:p.reduce((s,r)=>s+(Number(r.calculatedAmount)||0),0),unpaid:Math.max(0,total-paid)}};

function fieldsForRule(r){let h=`<div class="form-section"><label>実績日</label><input id="achievementDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>`;switch(r.calculationType){case'fixedMonthly':h+=`<div class="form-section"><label>対象月</label><input id="targetMonth" type="month" value="${new Date().toISOString().slice(0,7)}"></div>`;break;case'scoreRange':h+=`<div class="form-section"><div class="row"><div><label>教科</label><select id="subject">${subjectOptions()}</select></div><div><label>点数</label><input id="score" type="number" min="0" max="100" inputmode="numeric" placeholder="92"></div></div><label class="inline-check"><input id="reviewPerfect" type="checkbox">見直し後に満点になった（＋${money(r.reviewPerfectBonus||0)}）</label></div>`;break;case'perSubjectWithDailyCap':h+=`<div class="form-section"><div class="row"><div><label>教科</label><select id="subject">${subjectOptions()}</select></div><div><label>勉強時間（分）</label><input id="minutes" type="number" min="1" inputmode="numeric"></div></div><label>取り組んだ範囲</label><input id="studyRange" placeholder="ワーク32〜34ページなど"></div>`;break;case'fixedPerTestPeriod':h+=`<div class="form-section"><label>対象テスト</label><input id="testName" placeholder="2学期期末テスト"><label>取り組み内容</label><textarea id="content" placeholder="1週間の勉強内容を入力"></textarea><label class="inline-check"><input id="completedPlan" type="checkbox">30分以上の勉強と、決めた内容を達成した</label></div>`;break;case'totalScoreRange':h+=`<div class="form-section"><h3>5教科の点数</h3>${FIVE_SUBJECTS.map((s,i)=>`<div class="subject-row compact"><label>${s}</label><input class="five-score" data-subject="${s}" type="number" min="0" max="100" inputmode="numeric"></div>`).join('')}<label>5教科合計</label><input id="totalScore" class="readonly" readonly></div>`;break;case'reportCard':h+=`<div class="form-section"><h3>今学期の評定</h3>${NINE_SUBJECTS.map(s=>`<div class="subject-row compact"><label>${s}</label><select class="rating" data-subject="${s}"><option value="">選択</option>${[5,4,3,2,1].map(n=>`<option value="${n}">${n}</option>`).join('')}</select></div>`).join('')}<div class="muted small">前学期の評定との比較は、今後の版で過去データから自動判定します。この版では評定分のみ計算します。</div></div>`;break;case'perSubject':h+=`<div class="form-section"><label>完了した教科</label><select id="subject">${subjectOptions(r.subjects||NINE_SUBJECTS)}</select></div>`;break;case'fixed':h+=`<div class="form-section"><label>内容</label><input id="content" value="${escapeAttr(r.name)}"></div>`;break;case'fixedPerSession':h+=`<div class="form-section"><div class="row"><div><label>勉強時間（分）</label><input id="minutes" type="number" min="1" inputmode="numeric" value="${r.minimumMinutes||30}"></div><div><label>教科</label><select id="subject">${subjectOptions()}</select></div></div><label>取り組んだ内容</label><textarea id="content"></textarea></div>`;break;default:h+=`<div class="form-section"><label>内容</label><textarea id="content"></textarea></div>`}h+=evidenceFields(r);h+=`<div class="form-section"><label>メモ（任意）</label><textarea id="memo" placeholder="親に伝えたいことがあれば入力"></textarea></div>`;return h}
function wireDynamic(r){document.querySelectorAll('#dynamicFields input,#dynamicFields select,#dynamicFields textarea').forEach(el=>el.addEventListener('input',()=>recalculate(r)));document.querySelectorAll('input[name="evidenceMethod"]').forEach(el=>el.onchange=()=>{const photo=el.value==='photo'&&el.checked;$('recordEvidence')?.classList.toggle('hidden',photo);$('photoEvidence')?.classList.toggle('hidden',!photo)});const file=$('photoInput');if(file)file.onchange=async()=>{selectedFile=file.files?.[0]||null;const img=$('photoPreview');if(selectedFile&&img){img.src=URL.createObjectURL(selectedFile);img.classList.remove('hidden');let note=document.getElementById('photoSizeNote');if(!note){note=document.createElement('div');note.id='photoSizeNote';note.className='photo-size';img.insertAdjacentElement('afterend',note)}note.textContent='送信時にアプリが自動で150KB以下へ圧縮します。'}};document.querySelectorAll('.five-score').forEach(el=>el.addEventListener('input',()=>{const vals=[...document.querySelectorAll('.five-score')].map(x=>Number(x.value)||0);$('totalScore').value=vals.reduce((a,b)=>a+b,0);recalculate(r)}))}
function tierAmount(tiers,score){return [...(tiers||[])].sort((a,b)=>b.minScore-a.minScore).find(t=>score>=t.minScore)?.amount||0}
function recalculate(r){let amount=0;switch(r.calculationType){case'fixedMonthly':case'fixedPerTestPeriod':case'fixed':amount=r.amount||0;break;case'scoreRange':amount=tierAmount(r.scoreTiers,Number($('score')?.value)||0)+($('reviewPerfect')?.checked?(r.reviewPerfectBonus||0):0);break;case'perSubjectWithDailyCap':amount=Math.min(r.amountPerSubject||0,r.dailyCap||Infinity);break;case'totalScoreRange':amount=tierAmount(r.scoreTiers,Number($('totalScore')?.value)||0);break;case'reportCard':amount=[...document.querySelectorAll('.rating')].reduce((sum,x)=>sum+(r.ratingAmounts?.[x.value]||0),0);break;case'perSubject':amount=r.amountPerSubject||0;break;case'fixedPerSession':amount=(Number($('minutes')?.value)||0)>=(r.minimumMinutes||0)?(r.amount||0):0;break}if($('calculatedAmount'))$('calculatedAmount').textContent=money(amount);return amount}
function collectInputs(r){const g=id=>$(id)?.value??'';const inputs={achievementDate:g('achievementDate'),memo:g('memo')};switch(r.calculationType){case'fixedMonthly':inputs.targetMonth=g('targetMonth');break;case'scoreRange':Object.assign(inputs,{subject:g('subject'),score:Number(g('score')),reviewPerfect:$('reviewPerfect')?.checked||false});break;case'perSubjectWithDailyCap':Object.assign(inputs,{subject:g('subject'),minutes:Number(g('minutes')),range:g('studyRange')});break;case'fixedPerTestPeriod':Object.assign(inputs,{testName:g('testName'),content:g('content'),completedPlan:$('completedPlan')?.checked||false});break;case'totalScoreRange':inputs.scores={};document.querySelectorAll('.five-score').forEach(x=>inputs.scores[x.dataset.subject]=Number(x.value));inputs.totalScore=Number(g('totalScore'));break;case'reportCard':inputs.ratings={};document.querySelectorAll('.rating').forEach(x=>inputs.ratings[x.dataset.subject]=Number(x.value));break;case'perSubject':inputs.subject=g('subject');break;case'fixed':inputs.content=g('content');break;case'fixedPerSession':Object.assign(inputs,{minutes:Number(g('minutes')),subject:g('subject'),content:g('content')});break;default:inputs.content=g('content')}const method=document.querySelector('input[name="evidenceMethod"]:checked')?.value;if(method){inputs.evidenceMethod=method;inputs.evidenceText=g('evidenceText')}return inputs}
function validate(r,inputs){if(!inputs.achievementDate)return'実績日を入力してください。';if(r.calculationType==='scoreRange'&&(!Number.isFinite(inputs.score)||inputs.score<0||inputs.score>100))return'点数を0〜100で入力してください。';if(r.calculationType==='totalScoreRange'&&Object.values(inputs.scores).some(v=>!Number.isFinite(v)||v<0||v>100))return'5教科すべての点数を入力してください。';if(r.calculationType==='reportCard'&&Object.values(inputs.ratings).some(v=>!v))return'9教科すべての評定を選択してください。';if(r.calculationType==='fixedPerTestPeriod'&&!inputs.completedPlan)return'条件を達成した場合のみチェックしてください。';if(r.calculationType==='fixedPerSession'&&inputs.minutes<(r.minimumMinutes||0))return`${r.minimumMinutes||30}分以上の記録が必要です。`;if(r.evidenceType==='photoRequired'||r.evidenceType==='officialResult'){if(!selectedFile)return'証拠写真を選択してください。'}if(['photoOrRecord','recordOrPhoto','photoOrParentConfirmation'].includes(r.evidenceType)){if(inputs.evidenceMethod==='photo'&&!selectedFile&&!recordPhoto(editingRecord))return'写真を選択してください。';if((!inputs.evidenceMethod||inputs.evidenceMethod==='record')&&!String(inputs.evidenceText||'').trim()&&r.evidenceType!=='photoOrParentConfirmation')return'取り組んだ内容を入力するか、写真を登録してください。'}return''}
function dataUrlBytes(dataUrl){const b64=(dataUrl.split(',')[1]||'');return Math.ceil(b64.length*3/4)}
async function loadImageSource(file){
 try{return await createImageBitmap(file)}catch(e){
  return await new Promise((resolve,reject)=>{const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(url);resolve(img)};img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('この画像形式を読み込めません。JPEGまたはPNGで撮り直してください。'))};img.src=url})
 }
}
async function compressImageToDataUrl(file,targetBytes=150*1024){
 if(!file)return null;
 const source=await loadImageSource(file);
 const sw=source.width,sh=source.height;
 let maxSide=1200,quality=.62,best='';
 for(let attempt=0;attempt<12;attempt++){
  const scale=Math.min(1,maxSide/Math.max(sw,sh));
  const w=Math.max(1,Math.round(sw*scale)),h=Math.max(1,Math.round(sh*scale));
  const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d',{alpha:false});ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(source,0,0,w,h);
  const data=canvas.toDataURL('image/jpeg',quality);best=data;
  if(dataUrlBytes(data)<=targetBytes)return {dataUrl:data,bytes:dataUrlBytes(data),width:w,height:h};
  if(quality>.38)quality-=.06;else maxSide=Math.round(maxSide*.86);
 }
 if(dataUrlBytes(best)>220*1024)throw new Error('写真を十分に小さくできませんでした。テスト部分だけが写るように近づけて撮り直してください。');
 return {dataUrl:best,bytes:dataUrlBytes(best)};
}

async function showPayments(selectedPeriodId=null){
 const v=$('view');v.innerHTML='<section class="card"><h2>支給処理</h2><div class="muted">読み込み中…</div></section>';
 try{
  const [terms,records,payments]=await Promise.all([getTerms(),getAllRecords(),getAllPayments()]);
  if(!terms.length){v.innerHTML='<section class="card"><div class="empty">評価期間がありません。</div></section>';return}
  const current=terms.find(t=>t.isCurrent)?.id;
  const periodId=selectedPeriodId||current||terms[0].id;
  const children=[{id:'itsuki',name:'一輝'},{id:'akito',name:'暁斗'}];
  const cards=children.map(c=>{
   const approved=records.filter(r=>r.childId===c.id&&r.periodId===periodId&&r.status==='approved');
   const earned=approved.reduce((s,r)=>s+(Number(r.calculatedAmount)||0),0);
   const activePayments=payments.filter(p=>p.childId===c.id&&p.periodId===periodId&&p.status!=='cancelled');
   const paid=activePayments.reduce((s,p)=>s+(Number(p.amount)||0),0);

   const hasPhotos=approved.some(r=>recordPhoto(r));
   return `<div class="payment-card ${unpaid===0&&earned>0?'settled':''}"><div class="record-head"><div><h3 style="margin:0">${c.name}</h3><div class="muted">承認済み ${money(earned)} ／ 支給済み ${money(paid)}</div></div><strong>${unpaid===0&&earned>0?'支給完了':'未支給 '+money(unpaid)}</strong></div>${profile.role==='admin'&&unpaid>0?`<div class="row"><div><label>今回の支給額</label><input class="amount-input" id="payAmount-${c.id}" type="number" min="1" max="${unpaid}" value="${unpaid}" inputmode="numeric"></div><div><label>支給日</label><input id="payDate-${c.id}" type="date" value="${todayValue()}"></div></div><label>メモ（任意）</label><input id="payMemo-${c.id}" placeholder="現金で支給 など"><label class="check-note"><input id="deletePhotos-${c.id}" type="checkbox" ${hasPhotos?'checked':'disabled'}><span>全額支給が完了した場合、この評価期間の証拠写真を削除する${hasPhotos?'':'（削除対象なし）'}</span></label><button class="primary" data-register-payment="${c.id}" data-period="${periodId}" data-unpaid="${unpaid}">支給済みにする</button><button class="secondary" data-add-adjustment="${c.id}" data-period="${periodId}">金額調整を追加</button>`:profile.role==='viewer'?'<div class="section-note">閲覧のみのアカウントです。</div>':unpaid===0?`<div class="section-note">${earned>0?'この期間は支給済みです。すべての記録は確定され、編集・取り消しできません。':'現在、支給する未支給額はありません。'}</div>${earned===0&&profile.role==='admin'?`<button class="secondary" data-add-adjustment="${c.id}" data-period="${periodId}">金額調整を追加</button>`:''}`:''}</div>`
  }).join('');
  const history=payments.filter(p=>p.periodId===periodId);
  v.innerHTML=`<section class="card"><div class="screen-title"><h2>支給処理</h2><span class="badge">兄弟別</span></div><label>評価期間</label><select id="paymentPeriod">${terms.map(t=>`<option value="${t.id}" ${t.id===periodId?'selected':''}>${escapeHtml(t.label||periodLabel(t.id))}</option>`).join('')}</select><div class="section-note">支給額は未支給額の全額が初期表示されます。例外時のみ少ない金額へ変更できます。</div></section><section class="card"><h2>${escapeHtml(terms.find(t=>t.id===periodId)?.label||periodLabel(periodId))}</h2>${cards}</section><section class="card"><h2>支給履歴</h2><div class="payment-history">${history.length?history.map(paymentHistoryHtml).join(''):'<div class="empty">この期間の支給履歴はありません。</div>'}</div></section>`;
  $('paymentPeriod').onchange=e=>showPayments(e.target.value);
  document.querySelectorAll('[data-register-payment]').forEach(b=>b.onclick=()=>registerPayment(b.dataset.registerPayment,b.dataset.period,Number(b.dataset.unpaid)));
  document.querySelectorAll('[data-add-adjustment]').forEach(b=>b.onclick=()=>addBalanceAdjustment(b.dataset.addAdjustment,b.dataset.period));
 }catch(e){v.innerHTML=`<section class="card"><div class="status error">${escapeHtml(e.message)}</div></section>`}
}

  const [snap,records,payments]=await Promise.all([getDoc(doc(db,'payments',id)),getAllRecords(),getAllPayments()]);if(!snap.exists())throw new Error('支給記録が見つかりません。');const p={id:snap.id,...snap.data()};
  const earned=records.filter(r=>r.childId===p.childId&&r.periodId===p.periodId&&r.status==='approved').reduce((s,r)=>s+(Number(r.calculatedAmount)||0),0);
  const otherPaid=payments.filter(x=>x.id!==id&&x.childId===p.childId&&x.periodId===p.periodId&&x.status!=='cancelled').reduce((s,x)=>s+(Number(x.amount)||0),0);const max=Math.max(0,earned-otherPaid);
  const modal=document.createElement('div');modal.className='modal';modal.innerHTML=`<div class="dialog"><h2>支給記録を修正</h2><p class="muted">${escapeHtml(p.childDisplayName||p.childId)}｜${escapeHtml(periodLabel(p.periodId))}</p><label>支給額</label><input id="editPayAmount" type="number" min="1" max="${max}" value="${Number(p.amount)||0}"><label>支給日</label><input id="editPayDate" type="date" value="${escapeAttr(p.paidDate||todayValue())}"><label>メモ（任意）</label><input id="editPayMemo" value="${escapeAttr(p.memo||'')}"><div class="actions"><button id="savePaymentEdit" class="primary">保存</button><button id="cancelPaymentEdit" class="secondary">キャンセル</button></div></div>`;document.body.appendChild(modal);
  modal.querySelector('#cancelPaymentEdit').onclick=()=>modal.remove();modal.querySelector('#savePaymentEdit').onclick=async()=>{const amount=Number(modal.querySelector('#editPayAmount').value),paidDate=modal.querySelector('#editPayDate').value,memo=modal.querySelector('#editPayMemo').value.trim();if(!Number.isFinite(amount)||amount<=0||amount>max){alert(`支給額は1〜${money(max)}の範囲で入力してください。`);return}if(!paidDate){alert('支給日を入力してください。');return}await updateDoc(doc(db,'payments',id),{amount,paidDate,memo,updatedAt:serverTimestamp(),updatedBy:user.uid});modal.remove();await showPayments(p.periodId)}
 }catch(e){alert(`支給記録を修正できませんでした：${e.message}`)}
}
async function cancelPayment(id){alert('支給済みの記録は確定済みのため、取り消しできません。');return;
 if(profile.role!=='admin')return;if(!confirm('この支給記録を取り消しますか？\n完全削除せず、取消済みとして履歴に残します。'))return;
 try{const snap=await getDoc(doc(db,'payments',id));if(!snap.exists())throw new Error('支給記録が見つかりません。');const p=snap.data();await updateDoc(doc(db,'payments',id),{status:'cancelled',cancelledAt:serverTimestamp(),cancelledBy:user.uid,updatedAt:serverTimestamp()});await showPayments(p.periodId)}catch(e){alert(`支給記録を取り消せませんでした：${e.message}`)}
}
async function showRules(){const childId=profile.role==='child'?profile.childId:'itsuki';const v=$('view');v.innerHTML='<section class="card"><h2>ルール</h2><div class="muted">読み込み中…</div></section>';try{const qy=query(collection(db,'rules'),where('childId','==',childId));const s=await getDocs(qy);let rows=[];s.forEach(d=>rows.push({id:d.id,...d.data()}));rows.sort((a,b)=>(a.periodId||'').localeCompare(b.periodId||'')||(a.sortOrder||0)-(b.sortOrder||0));const groups={};for(const r of rows)(groups[r.periodId]??=[]).push(r);let html='';for(const [period,list] of Object.entries(groups)){html+=`<section class="card"><h2>${periodLabel(period)}</h2>`;for(const r of list){html+=`<div class="rule"><div class="rule-title">${r.name}</div><div class="rule-desc">${r.description||''}</div>${ruleDetail(r)}</div>`}html+='</section>'}v.innerHTML=html||'<section class="card"><div class="empty">ルールがありません。</div></section>'}catch(e){v.innerHTML=`<section class="card"><div class="status error">${e.message}</div></section>`}}
function ruleDetail(r){if(r.scoreTiers)return `<div class="rule-desc">${r.scoreTiers.filter(x=>x.amount>0).map(x=>`${x.minScore}点以上：${money(x.amount)}`).join(' ／ ')}</div>`;if(r.ratingAmounts)return `<div class="rule-desc">評定5：500円 ／ 4：300円 ／ 3：100円<br>評定アップ：＋300円 ／ 5維持：＋500円</div>`;if(r.rewardDescription)return `<div class="rule-desc"><strong>報酬：</strong>${r.rewardDescription}</div>`;if(r.amount)return `<div class="rule-desc"><strong>${money(r.amount)}</strong></div>`;if(r.amountPerSubject)return `<div class="rule-desc">1教科 ${money(r.amountPerSubject)}${r.dailyCap?`（1日最大 ${money(r.dailyCap)}）`:''}</div>`;return''}
async function showPolicy(){const v=$('view');try{const s=await getDoc(doc(db,'systemPolicies','general'));if(!s.exists())throw new Error('「ルールについて」が見つかりません。');const d=s.data();v.innerHTML=`<section class="card policy"><h2>${d.title||'ルールについて'}</h2><ul>${(d.items||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul></section>`}catch(e){v.innerHTML=`<section class="card"><div class="status error">${e.message}</div></section>`}}
function escapeHtml(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function escapeAttr(v){return escapeHtml(v).replace(/'/g,'&#39;')}
const saved=localStorage.getItem('lubAppConfig')||localStorage.getItem('lubFirebaseConfig');if(saved){try{const c=JSON.parse(saved);$('configInput').value=JSON.stringify(c,null,2);await connect(c)}catch{localStorage.removeItem('lubAppConfig')}}
</script></body></html>
